# ─────────────────────────────────────────────────────────────────────────────
# Dependabot — continuous dependency surveillance
#
# Watches dependencies for known CVEs and opens PRs with updates.
# This replaces running OWASP Dependency-Check on every PR, while still
# catching vulnerable libraries as fast as if you were scanning continuously.
#
# Free, runs on GitHub's infrastructure (no Actions minutes consumed).
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ── Maven dependencies per service ───────────────────────────────────────
  - package-ecosystem: maven
    directory: "/auth-service"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - auth-service
    # Group minor/patch updates into a single PR; major updates stay separate.
    groups:
      production-minor-patch:
        applies-to: version-updates
        dependency-type: production
        update-types: [minor, patch]
      development-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types: [minor, patch]

  # Add additional services below — same shape, different directory.
  # - package-ecosystem: maven
  #   directory: "/order-service"
  #   schedule:
  #     interval: daily
  #   ...

  # ── GitHub Actions versions ──────────────────────────────────────────────
  # Keeps action versions (actions/checkout, setup-java, etc.) current and
  # flags actions with known security issues.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    labels:
      - dependencies
      - github-actions

  # ── Docker base image updates ────────────────────────────────────────────
  # Flags when your eclipse-temurin base image has a newer version available.
  - package-ecosystem: docker
    directory: "/auth-service"
    schedule:
      interval: weekly
      day: sunday
    labels:
      - dependencies
      - docker
