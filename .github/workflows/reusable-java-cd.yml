# ─────────────────────────────────────────────────────────────────────────────
# Reusable — Java Build + AWS ECR Push + Kustomize Deploy
#
# Triggered after PR merges into main (dev), or manual dispatch (dev/staging/prod).
# Called by each service's cd-<service>.yml.
#
# Stages:
#   1. Maven package     — build fat JAR (skip tests — already passed in PR check)
#   2. Docker build+push — multi-platform image to AWS ECR Hub
#   3. Image scan        — Trivy vulnerability scan on the built image
#   4. Kustomize deploy  — patch image tag, apply to target environment
#   5. Rollout verify    — kubectl rollout status with timeout + auto-rollback
#
# Environment promotion:
#   main  → auto deploy to dev
#   dev   → manual trigger to staging
#   staging → manual trigger (with approval gate) to prod
#
# ECR Public Notes:
#   - ECR Public login must use us-east-1 region (AWS requirement)
#   - Public registry URI: public.ecr.aws/<alias>/<repo>
#   - No cost for public image storage and pull
# ─────────────────────────────────────────────────────────────────────────────

name: Reusable — Java CD (AWS ECR Public + Kustomize)

on:
  workflow_call:
    inputs:
      service-name:
        description: "e.g. auth-service — used for image name and k8s dir"
        required: true
        type: string
      service-dir:
        description: "Relative path to service root containing pom.xml"
        required: true
        type: string
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "21"
      image-tag:
        description: "Override image tag. Default: short SHA"
        required: false
        type: string
        default: ""
      ecr-registry:
        description: "ECR Public registry URI e.g. public.ecr.aws/o6c1v8x2"
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
        description: "AWS Access Key ID — for ECR Public login"
      AWS_SECRET_ACCESS_KEY:
        required: true
        description: "AWS Secret Access Key — for ECR Public login"
      KUBECONFIG_DEV:
        required: false
        description: "base64-encoded kubeconfig for dev cluster (Minikube)"
      KUBECONFIG_STAGING:
        required: false
        description: "base64-encoded kubeconfig for staging cluster"
      KUBECONFIG_PROD:
        required: false
        description: "base64-encoded kubeconfig for prod cluster"

env:
  # e.g. public.ecr.aws/o6c1v8x2/auth-service
  IMAGE_NAME: ${{ inputs.ecr-registry }}/${{ inputs.service-name }}
  # Use provided tag or fall back to short SHA
  IMAGE_TAG: ${{ inputs.image-tag != '' && inputs.image-tag || github.sha }}

jobs:
  build-and-push:
    name: Build & Push — ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Trivy SARIF upload

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.docker-build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java ${{ inputs.java-version }} (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      # ── Maven package (skip tests — they ran in PR check) ─────────────────
      - name: Maven package (skip tests)
        run: |
          cd ${{ inputs.service-dir }}
          mvn package -DskipTests --no-transfer-progress -B
        # NOTE: If you want to re-run tests on merge for extra confidence:
        #   remove -DskipTests and add needs-database input if required

      # ── Docker setup ──────────────────────────────────────────────────────
      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── ECR Public Login ──────────────────────────────────────────────────
      # ECR Public login MUST use us-east-1 regardless of your app region
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # ── Image metadata (tags + labels) ────────────────────────────────────
      # Produces tags like:
      #   public.ecr.aws/o6c1v8x2/auth-service:dev-abc1234
      #   public.ecr.aws/o6c1v8x2/auth-service:latest  (only on main)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=${{ inputs.environment }}-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      # ── Build & Push ──────────────────────────────────────────────────────
      # Builds amd64 + arm64 — arm64 needed if you ever use Graviton (AWS) or
      # Apple Silicon dev machines. Remove platforms line to build amd64 only (faster).
      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service-dir }}
          file: ${{ inputs.service-dir }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # GitHub Actions layer cache
          cache-to: type=gha,mode=max

      # ── Trivy Cache ───────────────────────────────────────────────────────
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: cache-trivy-${{ github.run_id }}
          restore-keys: cache-trivy-

      # ── Trivy Image Scan ──────────────────────────────────────────────────
      # Scans the pushed image for OS + library CVEs.
      # CRITICAL severity fails the build; HIGH is reported but non-blocking.
      # Uploads SARIF to GitHub Security tab.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest #Trivy is using the full SHA as the tag, but the image was pushed with a short SHA tag. latest tag always exists after push
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1" # fail on CRITICAL — change to '0' to make advisory only
          cache-dir: ~/.cache/trivy # ← use cached DB
        continue-on-error: true # non-blocking until your baseline is clean

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != '' # ← only if file exists
        with:
          sarif_file: trivy-results.sarif

