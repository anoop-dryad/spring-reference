# ─────────────────────────────────────────────────────────────────────────────
# Reusable — Java PR / Feature Branch Check
#
# Called by each service's ci-<service>.yml on PRs to main.
# Intentionally stops before Docker — no image build, no registry push.
# Goal: fast feedback (~5 min) for developers on every PR.
#
# Stages (per-PR, fast path):
#   1. Maven verify  — unit + integration tests + JaCoCo coverage
#   2. CodeQL        — GitHub SAST (security-extended queries, diff-aware)
#
# Heavy scans (OWASP Dependency-Check, full Semgrep) belong in a nightly
# scheduled workflow against `main`, not in per-PR CI. See:
#   .github/workflows/scheduled-security-scan.yml
#
# Dependency CVE surveillance is handled continuously by Dependabot
# (.github/dependabot.yml) — no PR-time cost.
# ─────────────────────────────────────────────────────────────────────────────

name: Reusable — Java PR Check

on:
  workflow_call:
    inputs:
      service-name:
        description: "Human-readable service name, e.g. auth-service"
        required: true
        type: string
      service-dir:
        description: "Relative path to the service root containing pom.xml"
        required: true
        type: string
      java-version:
        description: "Java version (default: 21)"
        required: false
        type: string
        default: "21"
      needs-database:
        description: "Spin up a Postgres service container for integration tests"
        required: false
        type: boolean
        default: false
      enforce-codeql:
        description: "Fail the PR on CodeQL findings (default: true)"
        required: false
        type: boolean
        default: true
    secrets:
      # Reserved for future use; kept here so callers can pass it without
      # editing this workflow. Not currently consumed by any step.
      NVD_API_KEY:
        required: false

# Cancel obsolete runs when a new commit lands on the same PR/branch.
# Saves CI minutes; gives developers feedback on their LATEST commit only.
concurrency:
  group: pr-check-${{ inputs.service-name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job A: Build, Test, Coverage ────────────────────────────────────────────
  # Split from CodeQL so that test failures don't block CodeQL upload, and
  # CodeQL doesn't block test feedback. They run in parallel.
  build-test:
    name: Build & Test — ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: read

    # GitHub-managed Postgres. Always defined; cost is ~5 seconds if unused.
    # Service containers don't support `if:` conditions, so we always start it
    # and let `needs-database` control whether the app actually uses it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: ${{ inputs.service-dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No fetch-depth: 0 needed here — only CodeQL needs full history.

      - name: Setup Java ${{ inputs.java-version }} (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven # caches ~/.m2 between runs — biggest single speedup

      # ── Two separate Maven steps so env vars are set ONLY when needed.
      # Empty-string env vars can confuse Spring Boot's datasource auto-config.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Maven verify (with Postgres)
        if: ${{ inputs.needs-database }}
        timeout-minutes: 15
        run: mvn verify --no-transfer-progress -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          # Force Spring to use the test profile if you have one
          SPRING_PROFILES_ACTIVE: test

      - name: Maven verify (no database)
        if: ${{ !inputs.needs-database }}
        timeout-minutes: 15
        run: mvn verify --no-transfer-progress -B
        env:
          SPRING_PROFILES_ACTIVE: test

      # ── Test reports — uploaded even on failure for debugging ──────────────
      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/target/surefire-reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn

      # ── Surface test results inline on the PR ──────────────────────────────
      # Adds a check-run with test summary; failures show in the PR conversation.
      - name: Publish test results to PR
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Tests — ${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  # ── Job B: CodeQL Security Analysis ────────────────────────────────────────
  # Runs in parallel with build-test so neither blocks the other.
  # Diff-aware: CodeQL natively analyzes only the changed paths on PRs.
  codeql:
    name: CodeQL — ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write # required to upload SARIF to Security tab
      actions: read # required by CodeQL to inspect workflow info

    defaults:
      run:
        working-directory: ${{ inputs.service-dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # CodeQL needs full history to compute the PR diff for analysis.
          fetch-depth: 0

      - name: Setup Java ${{ inputs.java-version }} (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      # ── CodeQL init MUST come before the build it analyzes ─────────────────
      # build-mode: manual = "I'll build it myself; trace what I compile."
      # The alternative (autobuild) is simpler but slower and less predictable.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin # modern identifier; 'java' is legacy
          queries: security-extended # broader than default; adds CWE rules
          build-mode: manual

      # Build only what CodeQL needs — skip tests for speed.
      # CodeQL doesn't need test execution, only compiled bytecode.
      - name: Compile for CodeQL
        run: mvn package -DskipTests --no-transfer-progress -B

      - name: CodeQL — Analyze
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
          # Upload SARIF even on findings; the Security tab is the source of truth.
          upload: always
        # Don't fail the step itself — we control failure via the next step
        # so that the SARIF upload always completes first.
        continue-on-error: true

      # Now decide whether CodeQL findings should fail the PR.
      # SARIF is always uploaded to the Security tab regardless of this check.
      - name: Enforce CodeQL findings gate
        if: ${{ inputs.enforce-codeql && steps.codeql.outcome != 'success' }}
        run: |
          echo "::error::CodeQL found security issues. See the Security tab for details."
          exit 1

  # ── Job C: Aggregate Status ────────────────────────────────────────────────
  # Single check the branch protection rule can require, instead of pinning
  # branch protection to each individual job name. Makes adding/removing jobs
  # later trivial without re-configuring branch protection.
  pr-check:
    name: PR Check — ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    needs: [build-test, codeql]
    if: always() # run even if upstream jobs failed, so we can summarize
    timeout-minutes: 2

    steps:
      - name: Aggregate results
        run: |
          echo "build-test: ${{ needs.build-test.result }}"
          echo "codeql:     ${{ needs.codeql.result }}"
          if [[ "${{ needs.build-test.result }}" != "success" ]] || \
             [[ "${{ needs.codeql.result }}" != "success" ]]; then
            echo "::error::One or more checks failed."
            exit 1
          fi
          echo "All checks passed."
