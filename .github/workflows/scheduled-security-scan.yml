# ─────────────────────────────────────────────────────────────────────────────
# Scheduled Security Scans
#
# Runs heavy security scans nightly against `main` for every service.
# Findings flow to the GitHub Security tab and as workflow artifacts.
#
# This intentionally runs OFF the PR critical path so:
#   - PR feedback stays fast (<5 min)
#   - Scans run against the latest CVE database every night
#   - New CVEs published yesterday get flagged on services that haven't changed
#
# Per-PR coverage (different workflow):
#   - Maven build + tests
#   - CodeQL (diff-aware)
#
# Continuous coverage (GitHub-managed):
#   - Dependabot for dependency CVEs (.github/dependabot.yml)
#   - GitHub secret scanning
# ─────────────────────────────────────────────────────────────────────────────

name: Scheduled Security Scans

on:
  schedule:
    # 03:00 UTC daily. Adjust if your team is in a timezone where this conflicts
    # with active development; off-peak avoids competing for Actions runners.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      service:
        description: "Scan a single service (leave empty to scan all)"
        required: false
        type: string

permissions:
  contents: read
  security-events: write # SARIF uploads to Security tab
  actions: read

# Don't run a second nightly scan if the previous one is still in progress.
concurrency:
  group: scheduled-security-scan
  cancel-in-progress: false

jobs:
  # ── Matrix over services ───────────────────────────────────────────────────
  # Add new services here. Or, in larger setups, auto-discover services by
  # globbing for pom.xml files in a setup job and feeding the matrix dynamically.
  scan:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false # one service's failure shouldn't skip the others
      matrix:
        service:
          - auth-service
          # - service-1
          # - service-2

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # ── OWASP NVD database cache ───────────────────────────────────────────
      # Key on YEAR-WEEK so the cache refreshes weekly. Daily would also work
      # but pays for more cache misses. Restore-keys lets older caches serve
      # as a starting point if the exact week's cache is missing.
      - name: Compute weekly cache key
        id: cache-key
        run: |
          echo "week=$(date -u +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      # ── OWASP Dependency Check ─────────────────────────────────────────────
      # CVSS ≥ 7 fails the workflow. Since this is nightly, failure means
      # an alert (email/Slack), not a blocked PR. That's the right trade-off:
      # comprehensive coverage without blocking development.
      - name: OWASP Dependency Check
        timeout-minutes: 30
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DenableRetired=true \
            -DnvdApiKey="$NVD_API_KEY" \
            -DnvdApiDelay=1000 \
            -DdataDirectory=$HOME/.owasp/dependency-check-data \
            -Dformats=HTML,SARIF \
            --no-transfer-progress

      - name: Upload OWASP HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-${{ matrix.service }}-${{ steps.cache-key.outputs.week }}
          path: ${{ matrix.service }}/target/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload OWASP findings to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.service }}/target/dependency-check-report.sarif
          category: owasp-${{ matrix.service }}

      # ── Semgrep — full ruleset, fail on findings ───────────────────────────
      - name: Semgrep — full SAST scan
        timeout-minutes: 15
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/spring-boot
            p/security-audit
            p/secrets
          generateSarif: "1"
          # Fail on findings — this is a nightly alert, not a PR gate.
        # No SEMGREP_APP_TOKEN needed for OSS rule packs.

      - name: Upload Semgrep findings to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.service }}/semgrep.sarif
          category: semgrep-${{ matrix.service }}
        continue-on-error: true # Semgrep SARIF can be malformed; don't block
