# ─────────────────────────────────────────────────────────────────────────────
# CI — auth-service PR Check
#
# This is the per-service caller. Copy this file for each microservice,
# changing service-name and service-dir. Everything else stays the same.
# ─────────────────────────────────────────────────────────────────────────────

name: CI — auth-service

on:
  pull_request:
    branches: [main]
    paths:
      - "auth-service/**"

# Cancel obsolete runs on the same PR/branch.
# Note: the reusable workflow has its own concurrency group too; this one
# applies at the caller level so the entire pipeline (not just the inner job)
# is cancelled when superseded.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-check:
    permissions:
      contents: read
      pull-requests: read
      security-events: write # for CodeQL SARIF upload
      actions: read
    uses: ./.github/workflows/reusable-java-pr-check.yml
    with:
      service-name: auth-service
      service-dir: auth-service
      java-version: "21"
      needs-database: true # set false if this service has no DB dependency
      enforce-codeql: true
    secrets:
      #  SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
