server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}?currentSchema=auth"
    username: "${DB_APP_USER}"
    password: "${DB_APP_PASSWORD}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      "[hibernate.default_schema]": auth
  flyway:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}"
    user: "${DB_FLYWAY_USER}"
    password: "${DB_FLYWAY_PASSWORD}"
    enabled: true
    schemas: auth
    create-schemas: true
    locations: classpath:db/migration

jwt:
  secret: "${JWT_SECRET:default-dev-secret-key-must-be-32-chars}"
  expiration-ms: 86400000

logging:
  level:
    "[com.anpks]": "${LOG_LEVEL:INFO}"

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

