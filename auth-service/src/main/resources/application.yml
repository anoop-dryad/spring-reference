# Dev-specific application.yaml.
#
# This REPLACES the application.yaml from base when applied via Kustomize's
# configMapGenerator with `files:`. Spring Boot loads the merged ConfigMap
# at /config/application.yaml.
#
# Differences from base:
#   - show-sql: true        (SQL visible in logs for debugging)
#   - LOG_LEVEL: DEBUG      (more verbose com.anpks logs)
#   - More actuator endpoints exposed
#   - show-details: always  (full health detail, not just authorized)

server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: auth-service
  datasource:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}?currentSchema=auth"
    username: "${DB_APP_USER}"
    password: "${DB_APP_PASSWORD}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true # Show SQL in dev
    open-in-view: false
    properties:
      "[hibernate.default_schema]": auth
  flyway:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}"
    user: "${DB_FLYWAY_USER}"
    password: "${DB_FLYWAY_PASSWORD}"
    enabled: true
    schemas: auth
    create-schemas: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: "${JWT_SECRET}"
  expiration-ms: 86400000

logging:
  level:
    "[com.anpks]": DEBUG # Verbose for dev
    "[org.hibernate.SQL]": DEBUG # Show generated SQL

springdoc:
  api-docs:
    enabled: true # Swagger on in dev
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans,mappings
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always # Full health info in dev
