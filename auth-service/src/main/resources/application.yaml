server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}?currentSchema=auth"
    username: "${DB_APP_USER}"
    password: "${DB_APP_PASSWORD}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      "[hibernate.default_schema]": auth
      "[hibernate.dialect]": org.hibernate.dialect.PostgreSQLDialect
  flyway:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}"
    user: "${DB_FLYWAY_USER}"
    password: "${DB_FLYWAY_PASSWORD}"
    enabled: true
    schemas: auth
    create-schemas: true
    locations: classpath:db/migration
