server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:anpks}?currentSchema=auth"
    username: "${DB_USERNAME:anoop}"
    password: "${DB_PASSWORD:anoop}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: true
    schemas: auth
    create-schemas: true
    locations: classpath:db/migration
