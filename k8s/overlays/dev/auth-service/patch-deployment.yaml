# ─────────────────────────────────────────────────────────────────────────────
# Dev patch: Deployment
#
# Smaller resource requests so the Deployment fits inside minikube's 4GB.
# Image pull policy IfNotPresent — lets minikube use a locally-loaded image
# if you ever build directly into minikube (via `eval $(minikube docker-env)`).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: auth-service
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
