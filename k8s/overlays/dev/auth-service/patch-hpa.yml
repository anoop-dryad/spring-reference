# ─────────────────────────────────────────────────────────────────────────────
# Dev patch: HPA
#
# No autoscaling on minikube — keep it at exactly 1 replica.
# Setting min=max=1 effectively disables scaling while keeping the HPA resource
# (useful for symmetry across environments).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
spec:
  minReplicas: 1
  maxReplicas: 1
