# ─────────────────────────────────────────────────────────────────────────────
# Dev Overlay Kustomization: auth-service
#
# Patches the base for local minikube deployment.
#
# Changes from base:
#   - Image tag pinned to :dev (or whatever your dev CI publishes)
#   - Resource requests lowered for tight 4GB minikube
#   - HPA min/max reduced to 1 replica (no autoscaling needed locally)
#   - Ingress hostname → auth.local
#   - Self-signed TLS cert (created via kubectl, see README)
#   - SWAGGER_ENABLED=true for local API exploration
#   - Real secret values (THIS FILE SHOULD BE GITIGNORED)
#
# Apply with:
#   kubectl apply -k k8s/overlays/dev/auth-service
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth-service

# Import the base, then layer dev-specific changes on top.
resources:
  - ../../../base/auth-service

# Inline ConfigMap changes for dev. Kustomize generates a new ConfigMap with
# these values merged on top of the base's.
configMapGenerator:
  - name: auth-service-config
    behavior: merge
    files:
      - application.yaml=application-dev.yaml

# ── Secrets from env files (gitignored) ─────────────────────────────────────
secretGenerator:
  - name: postgres-credentials
    behavior: replace
    envs:
      - postgres.env
  - name: auth-service-secrets
    behavior: replace
    envs:
      - auth.env

generatorOptions:
  disableNameSuffixHash: true

# Patches — small edits to existing resources from the base.
patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: auth-service
  - path: patch-hpa.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: auth-service
  - path: patch-ingress.yaml
    target:
      kind: Ingress
      name: auth-service

# Image override — handy for changing image tag without editing the YAML.
# Replace 'dev' with whichever tag your dev CI publishes, or use a specific SHA.
images:
  - name: public.ecr.aws/o6c1v8x2/auth-service
    newTag: latest
