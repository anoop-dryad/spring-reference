# ─────────────────────────────────────────────────────────────────────────────
# Dev patch: Ingress
#
# Hostname → auth.local (mapped via /etc/hosts to minikube's IP)
# TLS secret name stays "auth-tls"; we create it manually with a self-signed
# cert (see README's setup commands).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service
spec:
  tls:
    - hosts:
        - auth.local
      secretName: auth-tls
  rules:
    - host: auth.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8081
