# ─────────────────────────────────────────────────────────────────────────────
# Deployment: auth-service
#
# Runs the Spring Boot auth-service. The image is set in the base manifest
# to a known starting point; overlays patch this with env-specific tags
# (dev → :dev, prod → :v1.2.3, etc.).
#
# Key wiring:
#   - envFrom: ConfigMap + Secret merged into env vars at startup
#   - readiness/liveness probes: hit Spring Boot Actuator
#   - resources: requests/limits sized for a small Spring Boot service
#   - initContainer: wait for Postgres before starting the app
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: auth-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1 # overlays adjust per environment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # zero-downtime: new pod ready before old terminates
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: auth-service
        app.kubernetes.io/component: backend
    spec:
      # ── Wait for Postgres before starting the app ─────────────────────────
      # Prevents the app from crashing on startup if Postgres isn't ready yet.
      # initContainers run to completion before the main containers start.
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER"; do
                echo "Waiting for postgres..."
                sleep 2
              done
              echo "Postgres is ready."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER

      containers:
        - name: auth-service
          # Base image — overlays should patch this with the exact tag for each env.
          # public.ecr.aws/o6c1v8x2/auth-service is your ECR Public repo.
          image: public.ecr.aws/o6c1v8x2/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081

          # ── Configuration injection ────────────────────────────────────────
          # ConfigMap → non-secret env vars (DB host, log level, etc.)
          # Secrets → DB password, JWT secret
          # All merged into the pod's environment at startup.
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: auth-service-secrets

          # Map Postgres credentials to the Spring Boot env var names the app
          # actually reads. (Or set Spring properties via SPRING_DATASOURCE_*
          # naming — both work, depending on what your app expects.)
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            # Flyway uses a separate (higher-privilege) DB user.
            - name: SPRING_FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_FLYWAY_USER
            - name: SPRING_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_FLYWAY_PASSWORD

          # ── Health checks ──────────────────────────────────────────────────
          # Spring Boot Actuator exposes liveness/readiness endpoints.
          # Make sure your application.yml includes:
          #   management:
          #     endpoint:
          #       health:
          #         probes:
          #           enabled: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe gives Spring Boot extra time to come up (slow JVM start).
          # Without this, the liveness probe could kill the pod during Flyway migrations.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30 # 30 × 5s = 150 seconds max startup

          # ── Resources ──────────────────────────────────────────────────────
          # requests = what the pod is guaranteed (used by scheduler)
          # limits   = hard cap (pod killed if exceeded)
          # The Dockerfile uses MaxRAMPercentage=75, so heap = 75% of limit.
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          # ── Security context ───────────────────────────────────────────────
          # Belt-and-suspenders security. Dockerfile already runs as non-root,
          # this enforces it at the Kubernetes level too.
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Spring writes to /tmp
            capabilities:
              drop: ["ALL"]
