# ─────────────────────────────────────────────────────────────────────────────
# Postgres Service.
#
# A headless Service (clusterIP: None) for the StatefulSet. Gives Postgres
# a stable DNS name: postgres.auth-service.svc.cluster.local
#
# Within the same namespace, pods can connect using just "postgres" as the host.
# That's what we set DB_HOST=postgres in the ConfigMap.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: auth-service
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: auth-service
    app.kubernetes.io/component: database
spec:
  # Headless service — no cluster IP. Direct pod-to-pod via stable DNS.
  # For a single-replica StatefulSet this is functionally identical to ClusterIP.
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
