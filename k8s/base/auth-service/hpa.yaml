# ─────────────────────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler: auth-service
#
# Scales replicas based on CPU/memory utilization. Requires metrics-server
# (enabled via `minikube addons enable metrics-server`).
#
# Base values are placeholders; overlays patch them per environment:
#   - dev:     minReplicas=1, maxReplicas=2  (or remove HPA entirely)
#   - staging: minReplicas=2, maxReplicas=4
#   - prod:    minReplicas=3, maxReplicas=10
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  namespace: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: auth-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Conservative scale-down to avoid flapping.
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
