# ─────────────────────────────────────────────────────────────────────────────
# Deployment: auth-service
#
# Secrets are injected as env vars (DB_APP_USER, JWT_SECRET, etc.).
# The application.yaml mounted from ConfigMap references these via ${ENV_VAR}.
# Spring Boot substitutes them at startup.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: auth-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: auth-service
        app.kubernetes.io/component: backend
    spec:
      # ── Wait for Postgres before starting ─────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${DB_APP_USER}"; do
                echo "Waiting for postgres at ${PGHOST}:${PGPORT}..."
                sleep 2
              done
              echo "Postgres is ready."
          envFrom:
            - secretRef:
                name: postgres-credentials

      containers:
        - name: auth-service
          image: public.ecr.aws/o6c1v8x2/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081

          # ── Secrets as env vars ────────────────────────────────────────────
          # The application.yaml in /config/application.yaml references these.
          envFrom:
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: auth-service-secrets

          # ── Non-secret env overrides (LOG_LEVEL, SWAGGER_ENABLED) ──────────
          # Could go in the ConfigMap, but these change per-environment and
          # are simpler to override per-overlay as env vars.
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: SWAGGER_ENABLED
              value: "false"

          # ── Mount the application.yaml from the ConfigMap ──────────────────
          # Spring Boot scans /config/ by default and picks up application.yaml.
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true

          # ── Health checks ──────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # ── Resources ──────────────────────────────────────────────────────
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          # ── Security context ───────────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        - name: config-volume
          configMap:
            name: auth-service-config
