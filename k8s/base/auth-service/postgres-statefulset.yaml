# ─────────────────────────────────────────────────────────────────────────────
# Postgres for auth-service.
#
# On first boot:
#   - Postgres image creates POSTGRES_USER (appuser) from envFrom secret
#   - Init scripts from postgres-init-scripts ConfigMap run automatically
#   - Init script creates the Flyway user (DB_FLYWAY_USER)
#
# Probes use -h localhost to bypass PGHOST=postgres env var, which is set
# for the app's use and would otherwise route through Service DNS from
# inside the postgres pod itself.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: auth-service
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: auth-service
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: auth-service
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          # Secret provides POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
          # (used by the image to initialize) AND DB_FLYWAY_USER/PASSWORD
          # (used by the init script to create the Flyway user).
          envFrom:
            - secretRef:
                name: postgres-credentials

          # ── Probes use -h localhost to avoid PGHOST interference ──────────
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          volumeMounts:
            # Persistent data — survives pod restarts
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            # Init scripts — run on first boot of fresh database
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true

      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755 # rwx for owner — makes .sh scripts executable

  # ── Persistent storage ─────────────────────────────────────────────────────
  # StatefulSet auto-creates one PVC per replica. Survives pod deletion.
  # Delete the PVC explicitly to wipe data and re-run init scripts.
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
