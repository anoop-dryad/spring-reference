# ─────────────────────────────────────────────────────────────────────────────
# Postgres for auth-service.
#
# Uses StatefulSet (not Deployment) because Postgres needs:
#   - Stable, predictable pod name (postgres-0)
#   - Stable network identity (postgres-0.postgres.auth-service.svc.cluster.local)
#   - Persistent storage that survives pod restarts
#
# In production on EKS, replace this with RDS PostgreSQL and remove this file.
# The auth-service Deployment doesn't change — it just connects to a different
# DB_HOST.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: auth-service
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: auth-service
    app.kubernetes.io/component: database
spec:
  serviceName: postgres # ties to the headless Service of the same name
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: auth-service
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          # ── Health checks ─────────────────────────────────────────────────
          # pg_isready exits 0 when Postgres is accepting connections.
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          # ── Resource limits ───────────────────────────────────────────────
          # Conservative for a single-developer minikube setup.
          # Overlay can patch these for staging/prod.
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # ── Persistent storage ────────────────────────────────────────────
          # Mount the PVC at Postgres's data directory.
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres # avoids "lost+found" issues on some volumes

  # ── Volume claim template ──────────────────────────────────────────────────
  # StatefulSet auto-creates one PVC per replica. With replicas=1, you get
  # one PVC named postgres-data-postgres-0.
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # On minikube, the default storage class is "standard" (provisioned
        # by the storage-provisioner addon). On AWS EKS this would be "gp3".
        # Leaving it unset uses the cluster default.
        resources:
          requests:
            storage: 1Gi
