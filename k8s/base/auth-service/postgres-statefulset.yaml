# ─────────────────────────────────────────────────────────────────────────────
# Postgres for auth-service.
#
# Reads POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD from the
# postgres-credentials Secret. The Secret also contains the same values under
# DB_APP_USER, DB_APP_PASSWORD, etc. — those are for the app's Spring config,
# not for Postgres itself.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: auth-service
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: auth-service
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: auth-service
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          # The postgres image reads POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
          # from env vars and uses them to init the DB on first boot.
          envFrom:
            - secretRef:
                name: postgres-credentials
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
