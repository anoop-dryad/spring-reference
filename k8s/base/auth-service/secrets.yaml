# ─────────────────────────────────────────────────────────────────────────────
# Secrets: auth-service
#
# ⚠️  This file contains PLACEHOLDER values. Real values come from per-env
# overlays (which should be gitignored or sourced from a secret manager).
#
# Why this file exists in base/:
#   - Documents what secrets the service needs
#   - Provides the resource shape so overlays can patch values into it
#   - Kustomize requires the resource to exist in base to be patched
#
# In production (AWS):
#   - Replace these with references to AWS Secrets Manager via the
#     Secrets Store CSI Driver. The Deployment manifest stays identical;
#     only the source of the secret values changes.
# ─────────────────────────────────────────────────────────────────────────────

# ── Postgres credentials ────────────────────────────────────────────────────
# Used by BOTH the Postgres pod (to initialize) AND the auth-service pod
# (to connect). Must stay in sync.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: auth-service
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: auth-service
type: Opaque
stringData:
  POSTGRES_DB: "PLACEHOLDER-DB-NAME"
  POSTGRES_USER: "PLACEHOLDER-USER"
  POSTGRES_PASSWORD: "PLACEHOLDER-PASSWORD"
  POSTGRES_FLYWAY_USER: "PLACEHOLDER-FLYWAY-USER"
  POSTGRES_FLYWAY_PASSWORD: "PLACEHOLDER-FLYWAY-PASSWORD"

---
# ── Application secrets ─────────────────────────────────────────────────────
# JWT signing key. Must be at least 32 chars (256 bits) for HS256.
# Generate one with: openssl rand -base64 48
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: auth-service
type: Opaque
stringData:
  JWT_SECRET: "PLACEHOLDER-JWT-SECRET"
