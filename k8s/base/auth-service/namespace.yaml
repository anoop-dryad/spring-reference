# ─────────────────────────────────────────────────────────────────────────────
# Namespace for auth-service.
#
# All resources for the auth service live in this namespace. Single namespace
# per service makes management easy:
#   kubectl get all -n auth-service          → see everything
#   kubectl delete ns auth-service           → wipe everything
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: spring-reference-platform
