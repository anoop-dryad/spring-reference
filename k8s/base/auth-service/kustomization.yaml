# ─────────────────────────────────────────────────────────────────────────────
# Base Kustomization: auth-service
#
# Lists every resource that's part of the auth-service base. Overlays import
# this base and patch specific fields per environment.
#
# Common labels are applied to all resources for filtering with kubectl
# (e.g., `kubectl get all -l app.kubernetes.io/part-of=auth-service`).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources live in this namespace. Overlays can override.
namespace: auth-service

# Resources in apply order — namespace first, then storage/config, then workloads.
# Kustomize handles dependencies, but order here helps readability.
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres-service.yaml
  - postgres-statefulset.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - servicemonitor.yaml

# Labels applied to every resource. Useful for grouping and querying.
labels:
  - pairs:
      app.kubernetes.io/part-of: auth-service
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false # don't add to selectors (would break matching)
