# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: auth-service-config
#
# Holds the application.yaml that Spring Boot loads at startup.
# Mounted at /config/application.yaml in the pod — Spring's default search
# path includes /config/, so it's picked up automatically.
#
# Three bugs from the original application.yaml are fixed:
#   1. "heath" → "health" typo
#   2. Wrong list syntax for management.endpoints.web.exposure.include
#   3. Removed insecure default for jwt.secret
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: backend
data:
  application.yaml: |
    server:
      port: 8081
      shutdown: graceful

    spring:
      application:
        name: auth-service
      datasource:
        url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}?currentSchema=auth"
        username: "${DB_APP_USER}"
        password: "${DB_APP_PASSWORD}"
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        open-in-view: false
        properties:
          "[hibernate.default_schema]": auth
      flyway:
        url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}"
        user: "${DB_APP_USER}"
        password: "${DB_APP_PASSWORD}"
        enabled: true
        schemas: auth
        create-schemas: true
        locations: classpath:db/migration
      lifecycle:
        timeout-per-shutdown-phase: 30s

    jwt:
      secret: "${JWT_SECRET}"
      expiration-ms: 86400000

    logging:
      level:
        "[com.anpks]": "${LOG_LEVEL:INFO}"

    springdoc:
      api-docs:
        enabled: ${SWAGGER_ENABLED:false}
        path: /v3/api-docs
      swagger-ui:
        enabled: ${SWAGGER_ENABLED:false}
        path: /swagger-ui.html

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          probes:
            enabled: true
          show-details: when-authorized
